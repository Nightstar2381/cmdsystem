<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMD FOR ICELAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: transparent; /* For FiveM NUI */
            background-image: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            color: #e0e0e0;
            font-family: 'Prompt', 'JetBrains Mono', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .cmd-font {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Glassmorphism Terminal Window */
        .terminal-window {
            background: rgba(10, 15, 24, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 150, 255, 0.2);
            border-radius: 12px;
            width: 800px;
            max-width: 95vw;
            height: 550px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .terminal-header {
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .dot-red { background-color: #ff5f56; }
        .dot-yellow { background-color: #ffbd2e; }
        .dot-green { background-color: #27c93f; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 255, 255, 0.3); border-radius: 3px; }

        /* Glitch/Neon Effects */
        .neon-text {
            color: #00f3ff;
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.5), 0 0 10px rgba(0, 243, 255, 0.3);
        }

        .input-line::before {
            content: "root@iceland:~#";
            color: #00f3ff;
            margin-right: 10px;
            font-family: 'JetBrains Mono', monospace;
        }

        .blink-cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background-color: #00f3ff;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Loading Bar */
        .progress-bar-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 20px;
        }
        .progress-bar {
            height: 100%;
            background: #00f3ff;
            width: 0%;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px #00f3ff;
        }

        .screen {
            display: none;
            flex: 1;
            flex-direction: column;
            padding: 20px;
            height: calc(100% - 45px); /* Minus header */
        }

        .screen.active {
            display: flex;
        }

        /* Weapon Buttons */
        .cmd-btn {
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.3);
            color: #fff;
            padding: 10px 15px;
            border-radius: 6px;
            transition: all 0.2s;
            text-align: left;
            position: relative;
            overflow: hidden;
        }
        .cmd-btn:hover {
            background: rgba(0, 243, 255, 0.2);
            border-color: #00f3ff;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
            transform: translateX(5px);
        }
        .cmd-btn::before {
            content: ">";
            color: #00f3ff;
            margin-right: 8px;
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body>

    <div class="terminal-window">
        <!-- Terminal Header -->
        <div class="terminal-header">
            <div>
                <span class="dot dot-red"></span>
                <span class="dot dot-yellow"></span>
                <span class="dot dot-green"></span>
            </div>
            <div class="cmd-font text-sm font-bold tracking-widest text-gray-400">
                ICELAND_SYSTEM_v1.0
            </div>
            <div class="text-xs text-gray-500 cmd-font" id="clock">00:00:00</div>
        </div>

        <!-- SCREEN 1: LOGIN -->
        <div id="screen-login" class="screen active justify-center items-center">
            <div class="w-full max-w-sm">
                <div class="text-center mb-8">
                    <h1 class="text-4xl font-bold neon-text mb-2 cmd-font">ICELAND</h1>
                    <p class="text-gray-400 cmd-font text-sm">AUTHORIZED PERSONNEL ONLY</p>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs text-cyan-400 mb-1 cmd-font">USERNAME</label>
                        <input type="text" id="username" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:outline-none focus:border-cyan-400 cmd-font" placeholder="admin" value="admin">
                    </div>
                    <div>
                        <label class="block text-xs text-cyan-400 mb-1 cmd-font">PASSWORD</label>
                        <input type="password" id="password" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:outline-none focus:border-cyan-400 cmd-font" placeholder="••••••••" value="password">
                    </div>
                    <button onclick="startLogin()" class="w-full mt-6 bg-cyan-900 hover:bg-cyan-700 border border-cyan-400 text-white font-bold py-2 px-4 rounded transition-colors cmd-font">
                        [ INITIATE CONNECTION ]
                    </button>
                </div>
            </div>
        </div>

        <!-- SCREEN 2: LOADING -->
        <div id="screen-loading" class="screen justify-center p-10">
            <div class="w-full max-w-lg mx-auto mt-20">
                <h2 class="text-2xl font-bold neon-text mb-4 cmd-font">ESTABLISHING CONNECTION...</h2>
                <div id="loading-logs" class="h-32 overflow-hidden text-sm text-gray-400 cmd-font flex flex-col justify-end space-y-1">
                    <!-- Logs will be injected here -->
                </div>
                <div class="progress-bar-container">
                    <div id="loading-bar" class="progress-bar"></div>
                </div>
                <div class="text-right mt-2 text-xs text-cyan-400 cmd-font" id="loading-percentage">0%</div>
            </div>
        </div>

        <!-- SCREEN 3: MAIN PANEL -->
        <div id="screen-main" class="screen flex-row p-0">
            <!-- Sidebar / Categories -->
            <div class="w-64 bg-black/40 border-r border-cyan-900/50 p-4 flex flex-col h-full">
                <h2 class="text-xl font-bold text-white mb-6 border-b border-gray-700 pb-2 neon-text">
                    CMD FOR ICELAND
                </h2>

                <div class="mb-2 text-xs text-gray-500 font-bold tracking-wider cmd-font">หมวดอาวุธ (WEAPONS)</div>
                <div class="flex flex-col space-y-2 flex-1">
                    <button class="cmd-btn" onclick="executeCommand('giveweapon', 'ปากฉลาม')">ปากฉลาม</button>
                    <button class="cmd-btn" onclick="executeCommand('giveweapon', 'ไม้พลู')">ไม้พลู</button>
                    <button class="cmd-btn" onclick="executeCommand('giveweapon', 'หมัด')">หมัด</button>
                    <button class="cmd-btn" onclick="executeCommand('giveweapon', 'หัวแข็ง')">หัวแข็ง</button>
                </div>
                
                <button onclick="logout()" class="mt-auto text-sm text-red-400 hover:text-red-300 cmd-font text-left flex items-center">
                    <span class="mr-2">[x]</span> TERMINATE SESSION
                </button>
            </div>

            <!-- Terminal Output Area -->
            <div class="flex-1 flex flex-col bg-transparent relative">
                <div class="flex-1 p-4 overflow-y-auto cmd-font text-sm" id="terminal-output">
                    <div class="text-green-400 mb-4">
                        Welcome to ICELAND CMD SYSTEM.<br>
                        Type 'help' or click menu to execute commands.<br>
                        Status: <span class="text-cyan-400">ONLINE</span>
                    </div>
                </div>
                
                <!-- Command Input line -->
                <div class="p-4 border-t border-gray-800 bg-black/50 flex items-center text-sm">
                    <span class="input-line"></span>
                    <input type="text" id="cmd-input" class="bg-transparent text-white focus:outline-none flex-1 cmd-font" autocomplete="off" onkeypress="handleEnter(event)">
                    <span class="blink-cursor"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Clock Update
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour12: false });
        }, 1000);

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // Login & Loading Logic (Exactly 3 seconds)
        function startLogin() {
            switchScreen('screen-loading');
            
            const progressBar = document.getElementById('loading-bar');
            const percentText = document.getElementById('loading-percentage');
            const logsContainer = document.getElementById('loading-logs');
            
            progressBar.style.width = '0%';
            logsContainer.innerHTML = '';
            
            const loadingTime = 3000; // 3 seconds
            const intervalTime = 50; 
            const steps = loadingTime / intervalTime;
            let currentStep = 0;

            const fakeLogs = [
                "Connecting to ICELAND server...",
                "Bypassing security protocols...",
                "Loading weapon modules...",
                "Decrypting user data...",
                "Mounting resources...",
                "Syncing database...",
                "Access Granted."
            ];

            const interval = setInterval(() => {
                currentStep++;
                const percentage = Math.min(100, (currentStep / steps) * 100);
                
                progressBar.style.width = `${percentage}%`;
                percentText.innerText = `${Math.floor(percentage)}%`;

                // Add random logs based on progress
                if (currentStep % Math.floor(steps / fakeLogs.length) === 0) {
                    const logIndex = Math.floor((currentStep / steps) * fakeLogs.length) - 1;
                    if (fakeLogs[logIndex]) {
                        const logEl = document.createElement('div');
                        logEl.innerText = `[SYS] ${fakeLogs[logIndex]}`;
                        logsContainer.appendChild(logEl);
                    }
                }

                if (currentStep >= steps) {
                    clearInterval(interval);
                    setTimeout(() => {
                        switchScreen('screen-main');
                        document.getElementById('cmd-input').focus();
                        addTerminalLog('System initialized successfully.', 'success');
                    }, 200);
                }
            }, intervalTime);
        }

        function logout() {
            switchScreen('screen-login');
            document.getElementById('terminal-output').innerHTML = `
                <div class="text-green-400 mb-4">
                    Welcome to ICELAND CMD SYSTEM.<br>
                    Type 'help' or click menu to execute commands.<br>
                    Status: <span class="text-cyan-400">ONLINE</span>
                </div>
            `;
        }

        // Terminal Output Logic
        function addTerminalLog(message, type = 'normal') {
            const output = document.getElementById('terminal-output');
            const logLine = document.createElement('div');
            
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            
            let colorClass = 'text-gray-300';
            if (type === 'success') colorClass = 'text-green-400';
            if (type === 'error') colorClass = 'text-red-400';
            if (type === 'system') colorClass = 'text-cyan-400';

            logLine.innerHTML = `<span class="text-gray-600">[${time}]</span> <span class="${colorClass}">${message}</span>`;
            output.appendChild(logLine);
            
            // Auto scroll to bottom
            output.scrollTop = output.scrollHeight;
        }

        function executeCommand(action, item) {
            if (action === 'giveweapon') {
                addTerminalLog(`Executing: giveweapon ${item}`, 'system');
                
                // Simulate processing delay
                setTimeout(() => {
                    addTerminalLog(`> สำเร็จ! เสกอาวุธ: [${item}] เข้ากระเป๋าเรียบร้อยแล้ว`, 'success');
                    
                    // You can trigger FiveM NUI callbacks here, e.g.:
                    // fetch(`https://${GetParentResourceName()}/giveItem`, {
                    //     method: 'POST',
                    //     body: JSON.stringify({ item: item })
                    // });
                }, 400);
            }
        }

        function handleEnter(event) {
            if (event.key === 'Enter') {
                const input = document.getElementById('cmd-input');
                const val = input.value.trim();
                
                if (val) {
                    addTerminalLog(`root@iceland:~# ${val}`, 'normal');
                    
                    // Simple custom commands
                    if (val.toLowerCase() === 'clear') {
                        document.getElementById('terminal-output').innerHTML = '';
                    } else if (val.toLowerCase() === 'help') {
                        addTerminalLog('Available commands: clear, help. Or use the sidebar buttons.', 'system');
                    } else {
                        addTerminalLog(`Command not found: ${val}`, 'error');
                    }
                    
                    input.value = '';
                }
            }
        }

        // Add auto-focus on input click
        document.getElementById('screen-main').addEventListener('click', () => {
            document.getElementById('cmd-input').focus();
        });
    </script>
</body>
</html>
