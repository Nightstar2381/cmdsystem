<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMD FOR ICELAND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: transparent; /* For FiveM NUI */
            /* Icy Deep Blue Gradient */
            background-image: radial-gradient(circle at top left, #0b2e59 0%, #030b17 100%);
            color: #e0fbfc;
            font-family: 'Prompt', 'JetBrains Mono', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .cmd-font {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Frosted Glass Terminal Window */
        .terminal-window {
            background: rgba(12, 36, 65, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(144, 224, 239, 0.3);
            box-shadow: 0 0 40px rgba(0, 180, 216, 0.2), inset 0 0 20px rgba(144, 224, 239, 0.05);
            border-radius: 16px;
            width: 800px;
            max-width: 95vw;
            height: 550px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .terminal-header {
            background: rgba(2, 12, 27, 0.6);
            border-bottom: 1px solid rgba(144, 224, 239, 0.2);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
        }
        .dot-red { background-color: #ff5f56; }
        .dot-yellow { background-color: #ffbd2e; }
        .dot-green { background-color: #00f5d4; } /* Icy Green */

        /* Icy Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(144, 224, 239, 0.4); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(144, 224, 239, 0.7); }

        /* Frost/Ice Neon Effects */
        .neon-text {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8), 0 0 15px rgba(144, 224, 239, 0.6), 0 0 25px rgba(0, 180, 216, 0.4);
        }

        .input-line::before {
            content: "root@iceland:~#";
            color: #90e0ef;
            margin-right: 10px;
            font-family: 'JetBrains Mono', monospace;
            text-shadow: 0 0 5px rgba(144, 224, 239, 0.5);
        }

        .blink-cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background-color: #90e0ef;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
            box-shadow: 0 0 8px #90e0ef;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Frozen Loading Bar */
        .progress-bar-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 20px;
            border: 1px solid rgba(144, 224, 239, 0.1);
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #00b4d8, #caf0f8);
            width: 0%;
            transition: width 0.1s linear;
            box-shadow: 0 0 15px #90e0ef;
        }

        .screen {
            display: none;
            flex: 1;
            flex-direction: column;
            padding: 20px;
            height: calc(100% - 45px);
        }

        .screen.active {
            display: flex;
        }

        /* Icy Weapon Buttons */
        .cmd-btn {
            background: rgba(0, 180, 216, 0.05);
            border: 1px solid rgba(144, 224, 239, 0.25);
            color: #caf0f8;
            padding: 10px 15px;
            border-radius: 6px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-align: left;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }
        .cmd-btn:hover {
            background: rgba(144, 224, 239, 0.15);
            border-color: #90e0ef;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(0, 180, 216, 0.3), inset 0 0 10px rgba(144, 224, 239, 0.1);
            transform: translateX(5px);
        }
        .cmd-btn::before {
            content: "❄";
            color: #90e0ef;
            margin-right: 8px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <div class="terminal-window">
        <!-- Terminal Header -->
        <div class="terminal-header">
            <div>
                <span class="dot dot-red"></span>
                <span class="dot dot-yellow"></span>
                <span class="dot dot-green"></span>
            </div>
            <div class="cmd-font text-sm font-bold tracking-widest text-blue-200 opacity-80">
                ICELAND_CRYO_SYSTEM_v2.0
            </div>
            <div class="text-xs text-blue-300 cmd-font opacity-70" id="clock">00:00:00</div>
        </div>

        <!-- SCREEN 1: LOGIN -->
        <div id="screen-login" class="screen active justify-center items-center">
            <div class="w-full max-w-sm">
                <div class="text-center mb-8">
                    <h1 class="text-5xl font-bold neon-text mb-2 cmd-font tracking-wider">ICELAND</h1>
                    <p class="text-blue-200 cmd-font text-sm opacity-80">FROST PROTOCOL ENGAGED</p>
                </div>
                
                <div class="space-y-4 p-6 bg-blue-900/10 rounded-xl border border-blue-400/10 backdrop-blur-sm">
                    <div>
                        <label class="block text-xs text-blue-300 mb-1 cmd-font">OPERATIVE ID</label>
                        <input type="text" id="username" class="w-full bg-blue-950/40 border border-blue-500/30 rounded p-2 text-blue-50 focus:outline-none focus:border-blue-300 focus:bg-blue-900/40 transition-all cmd-font placeholder-blue-700" placeholder="admin" value="admin">
                    </div>
                    <div>
                        <label class="block text-xs text-blue-300 mb-1 cmd-font">DECRYPTION KEY</label>
                        <input type="password" id="password" class="w-full bg-blue-950/40 border border-blue-500/30 rounded p-2 text-blue-50 focus:outline-none focus:border-blue-300 focus:bg-blue-900/40 transition-all cmd-font placeholder-blue-700" placeholder="••••••••" value="password">
                    </div>
                    <button onclick="startLogin()" class="w-full mt-6 bg-blue-600/20 hover:bg-blue-500/40 border border-blue-300/50 text-white font-bold py-2 px-4 rounded transition-all duration-300 cmd-font shadow-[0_0_15px_rgba(0,180,216,0.2)] hover:shadow-[0_0_20px_rgba(144,224,239,0.4)]">
                        [ UNLOCK TERMINAL ]
                    </button>
                </div>
            </div>
        </div>

        <!-- SCREEN 2: LOADING -->
        <div id="screen-loading" class="screen justify-center p-10">
            <div class="w-full max-w-lg mx-auto mt-20">
                <h2 class="text-2xl font-bold neon-text mb-4 cmd-font">COOLING SYSTEMS TO ABSOLUTE ZERO...</h2>
                <div id="loading-logs" class="h-32 overflow-hidden text-sm text-blue-200/70 cmd-font flex flex-col justify-end space-y-1">
                    <!-- Logs will be injected here -->
                </div>
                <div class="progress-bar-container">
                    <div id="loading-bar" class="progress-bar"></div>
                </div>
                <div class="text-right mt-2 text-xs text-blue-300 cmd-font" id="loading-percentage">0%</div>
            </div>
        </div>

        <!-- SCREEN 3: MAIN PANEL -->
        <div id="screen-main" class="screen flex-row p-0">
            <!-- Sidebar / Categories -->
            <div class="w-64 bg-blue-950/30 border-r border-blue-400/20 p-4 flex flex-col h-full backdrop-blur-md">
                <h2 class="text-xl font-bold text-white mb-6 border-b border-blue-400/30 pb-3 neon-text tracking-wide">
                    CRYO CMD
                </h2>

                <div class="mb-3 text-xs text-blue-300/80 font-bold tracking-widest cmd-font">COLD ARSENAL (WEAPONS)</div>
                <div class="flex flex-col space-y-3 flex-1">
                    <button class="cmd-btn" onclick="executeCommand('giveweapon', 'ปากฉลาม')">ปากฉลาม (Ice Shard)</button>
                    <button class="cmd-btn" onclick="executeCommand('giveweapon', 'ไม้พลู')">ไม้พลู (Frost Cue)</button>
                    <button class="cmd-btn" onclick="executeCommand('giveweapon', 'หมัด')">หมัด (Cold Fists)</button>
                    <button class="cmd-btn" onclick="executeCommand('giveweapon', 'หัวแข็ง')">หัวแข็ง (Glacier Head)</button>
                </div>
                
                <button onclick="logout()" class="mt-auto text-sm text-red-300/80 hover:text-red-300 hover:text-shadow-sm transition-all cmd-font text-left flex items-center bg-red-900/10 p-2 rounded border border-red-500/20 hover:bg-red-900/30">
                    <span class="mr-2">[!]</span> FREEZE SESSION
                </button>
            </div>

            <!-- Terminal Output Area -->
            <div class="flex-1 flex flex-col bg-transparent relative">
                <div class="flex-1 p-5 overflow-y-auto cmd-font text-sm leading-relaxed" id="terminal-output">
                    <div class="text-teal-300 mb-4 bg-teal-900/20 p-3 rounded border border-teal-500/20">
                        Welcome to ICELAND CRYO SYSTEM.<br>
                        Type 'help' or click menu to execute cold protocols.<br>
                        Core Status: <span class="text-blue-200 font-bold drop-shadow-[0_0_5px_rgba(144,224,239,0.8)]">FROZEN & STABLE</span>
                    </div>
                </div>
                
                <!-- Command Input line -->
                <div class="p-4 border-t border-blue-400/20 bg-blue-950/50 flex items-center text-sm backdrop-blur-md">
                    <span class="input-line"></span>
                    <input type="text" id="cmd-input" class="bg-transparent text-white focus:outline-none flex-1 cmd-font placeholder-blue-800" placeholder="Enter command..." autocomplete="off" onkeypress="handleEnter(event)">
                    <span class="blink-cursor"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Clock Update
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour12: false });
        }, 1000);

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // Login & Loading Logic (Exactly 3 seconds)
        function startLogin() {
            switchScreen('screen-loading');
            
            const progressBar = document.getElementById('loading-bar');
            const percentText = document.getElementById('loading-percentage');
            const logsContainer = document.getElementById('loading-logs');
            
            progressBar.style.width = '0%';
            logsContainer.innerHTML = '';
            
            const loadingTime = 3000; // 3 seconds
            const intervalTime = 50; 
            const steps = loadingTime / intervalTime;
            let currentStep = 0;

            const fakeLogs = [
                "Establishing secure connection to Ice Citadel...",
                "Bypassing thermal security protocols...",
                "Loading cryo-weapon modules...",
                "Cooling core temp to -273.15°C...",
                "Decrypting frozen user data...",
                "Syncing frost database...",
                "Access Granted. Welcome to the cold."
            ];

            const interval = setInterval(() => {
                currentStep++;
                const percentage = Math.min(100, (currentStep / steps) * 100);
                
                progressBar.style.width = `${percentage}%`;
                percentText.innerText = `${Math.floor(percentage)}%`;

                // Add random logs based on progress
                if (currentStep % Math.floor(steps / fakeLogs.length) === 0) {
                    const logIndex = Math.floor((currentStep / steps) * fakeLogs.length) - 1;
                    if (fakeLogs[logIndex]) {
                        const logEl = document.createElement('div');
                        logEl.innerText = `[CRYO] ${fakeLogs[logIndex]}`;
                        logsContainer.appendChild(logEl);
                    }
                }

                if (currentStep >= steps) {
                    clearInterval(interval);
                    setTimeout(() => {
                        switchScreen('screen-main');
                        document.getElementById('cmd-input').focus();
                        addTerminalLog('Cryo-system initialized successfully.', 'success');
                    }, 200);
                }
            }, intervalTime);
        }

        function logout() {
            switchScreen('screen-login');
            document.getElementById('terminal-output').innerHTML = `
                <div class="text-teal-300 mb-4 bg-teal-900/20 p-3 rounded border border-teal-500/20">
                    Welcome to ICELAND CRYO SYSTEM.<br>
                    Type 'help' or click menu to execute cold protocols.<br>
                    Core Status: <span class="text-blue-200 font-bold drop-shadow-[0_0_5px_rgba(144,224,239,0.8)]">FROZEN & STABLE</span>
                </div>
            `;
        }

        // Terminal Output Logic
        function addTerminalLog(message, type = 'normal') {
            const output = document.getElementById('terminal-output');
            const logLine = document.createElement('div');
            logLine.className = 'mb-1';
            
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            
            let colorClass = 'text-blue-100';
            if (type === 'success') colorClass = 'text-teal-300';
            if (type === 'error') colorClass = 'text-red-400';
            if (type === 'system') colorClass = 'text-blue-300';

            logLine.innerHTML = `<span class="text-blue-500/60">[${time}]</span> <span class="${colorClass}">${message}</span>`;
            output.appendChild(logLine);
            
            // Auto scroll to bottom
            output.scrollTop = output.scrollHeight;
        }

        function executeCommand(action, item) {
            if (action === 'giveweapon') {
                addTerminalLog(`Executing: giveweapon ${item}`, 'system');
                
                // Simulate processing delay
                setTimeout(() => {
                    addTerminalLog(`> สำเร็จ! เสกอาวุธความเย็น: [${item}] เข้ากระเป๋าเรียบร้อยแล้ว ❄️`, 'success');
                    
                    // You can trigger FiveM NUI callbacks here, e.g.:
                    // fetch(`https://${GetParentResourceName()}/giveItem`, {
                    //     method: 'POST',
                    //     body: JSON.stringify({ item: item })
                    // });
                }, 400);
            }
        }

        function handleEnter(event) {
            if (event.key === 'Enter') {
                const input = document.getElementById('cmd-input');
                const val = input.value.trim();
                
                if (val) {
                    addTerminalLog(`root@iceland:~# ${val}`, 'normal');
                    
                    // Simple custom commands
                    if (val.toLowerCase() === 'clear') {
                        document.getElementById('terminal-output').innerHTML = '';
                    } else if (val.toLowerCase() === 'help') {
                        addTerminalLog('Available protocols: clear, help. Or use the Cold Arsenal panel.', 'system');
                    } else {
                        addTerminalLog(`Protocol not recognized: ${val}`, 'error');
                    }
                    
                    input.value = '';
                }
            }
        }

        // Add auto-focus on input click
        document.getElementById('screen-main').addEventListener('click', () => {
            document.getElementById('cmd-input').focus();
        });
    </script>
</body>
</html>
